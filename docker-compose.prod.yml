services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  celery_worker:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
    restart: unless-stopped

  celery_beat:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - redis
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_data:
